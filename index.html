<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/hub-boot.css" />
    <title>Stealth Browser Console</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b1020;
        color: #e8ecff;
      }
      #root {
        min-height: 100%;
        height: 100%;
      }
    </style>
    <script>
      (function () {
        var t = localStorage.getItem("stealth-console-theme");
        if (t === "light") document.documentElement.classList.add("light");
        document.documentElement.classList.add("theme-hub");
      })();
    </script>
  </head>
  <body>
    <div id="hub-boot-loader" class="hub-boot-loader--pane" role="status" aria-label="Loading Stealth Browser Console">
      <div class="hub-boot-orb" aria-hidden="true">
        <span class="hub-boot-orb__ring"></span>
        <span class="hub-boot-orb__ring hub-boot-orb__ring--dash"></span>
        <span class="hub-boot-orb__ring hub-boot-orb__ring--inner"></span>
        <span class="hub-boot-orb__core">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
            <path d="M12 2a4 4 0 0 1 4 4v1h2a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h2V6a4 4 0 0 1 4-4z" />
          </svg>
        </span>
      </div>
    </div>
    <div id="root"></div>
    <script src="/hub-boot-fallback.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
