<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workflow Quick Run</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header class="wqr-header">
      <h1>Quick Run</h1>

    <script src="sidepanel.js"></script>
  </body>
